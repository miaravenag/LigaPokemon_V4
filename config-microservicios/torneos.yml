server:
  port: 0

spring:
  application:
    name: torneos
  datasource:
    url: jdbc:mysql://localhost:3306/bd_torneos
    username: root
    password:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
  flyway:

    baseline-on-migrate: true

    locations: classpath:db/migration

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    instance-id: ${spring.application.name}:${random.value}
    prefer-ip-address: true

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enable: true
    path: /swagger-ui.html